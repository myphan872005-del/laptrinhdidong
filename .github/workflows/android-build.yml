name: Tự động Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone code
        uses: actions/checkout@v4 # Đổi v3 thành v4 ở đây

      - name: ☕ Cài đặt Java 17
        uses: actions/setup-java@v4 # Đổi v3 thành v4 ở đây
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Cấp quyền cho Gradle
        run: chmod +x gradlew

      - name: 🚀 Tiến hành Build APK
        run: ./gradlew assembleDebug

      - name: 📦 Đóng gói file APK
        uses: actions/upload-artifact@v4 # Đổi v3 thành v4 ở đây
        with:
          name: UEDCustomMaps-APK
          path: app/build/outputs/apk/debug/app-debug.apk